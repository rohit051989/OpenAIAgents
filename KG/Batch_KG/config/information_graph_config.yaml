# Projects, Folders, and Packages are AUTO-DETECTED:
# - Project: Any directory containing pom.xml or build.gradle
# - Folder: Any directory that's not a project or package
# - Package: Directories in src/main/java or src/test/java until .java files
    

# File type identification rules
file_type_rules:
  java_class:
    extensions: [".java"]
    exclude_patterns: ["Test\\.java$", "IT\\.java$", "TestCase\\.java$"]
    locations: ["src/main/java", "src/java", "src"]
    
  java_test_class:
    extensions: [".java"]
    include_patterns: ["Test\\.java$", "IT\\.java$", "TestCase\\.java$"]
    locations: ["src/test/java", "test", "src/test"]
    
  pom_file:
    exact_names: ["pom.xml"]
  
  web_xml_file:
    exact_names: ["web.xml"]
    
  spring_config:
    # Spring XML files are identified by checking for Spring namespaces in XML content
    # Only XML files can be Spring bean configuration files
    extensions: [".xml"]
    exclude_patterns: ["pom\\.xml$", "web\\.xml$"]
    # Will be validated by _is_spring_xml() method during file type identification
    
  property_file:
    extensions: [".properties", ".env"]
    locations: ["src/main/resources", "resources", "config"]
    
  xml_config:
    # Generic XML config files (Spring XMLs are auto-detected by namespace)
    extensions: [".xml"]
    exclude_patterns: ["pom\\.xml$", "web\\.xml$"]
    
  docker_file:
    exact_names: ["Dockerfile", "docker-compose.yml", ".dockerignore"]
    
  ci_cd_file:
    exact_names: ["azure-pipelines.yml", "azure-pipelines-artifactory-onprem.yml", "Jenkinsfile", ".gitlab-ci.yml"]
    include_patterns: [".github/workflows/.*\\.yml$"]

  shell_script:
    extensions: [".sh", ".bat", ".cmd", ".ps1", ".pl"]

  sql_script:
    extensions: [".sql", ".ddl"]

# Directories to skip during scanning
skip_directories:
  - ".git"
  - "__pycache__"
  - "node_modules"
  - ".venv"
  - "venv"
  - "target"
  - "build"
  - ".idea"
  - ".vscode"
  - "bin"
  - "obj"
  - ".gradle"
  - "out"

# Files to skip during scanning (exact names or patterns)
skip_files:
  - ".gitignore"
  - ".gitattributes"
  - ".editorconfig"
  - ".DS_Store"
  - "Thumbs.db"
  - ".env"
  - ".env.local"
  - ".env.development"
  - ".env.test"
  - ".env.production"
  - "*.log"
  - "*.tmp"
  - "*.bak"
  - "*.swp"
  - "*~"
  - ".npmrc"
  - ".yarnrc"
  - "package-lock.json"
  - "yarn.lock"
  - ".classpath"
  - ".project"

# Test directory patterns (used to identify test classes vs regular classes)
test_patterns:
  - "/src/test/"
  - "/test/"
  - "/src/main/test/"
  - "\\src\\test\\"
  - "\\test\\"
  - "\\src\\main\\test\\"

# Neo4j connection settings
neo4j:
  uri: "bolt://localhost:7687"
  user: "neo4j"
  password: "Rohit@123"
  database_ig: "informationgraph"
  database_kg: "knowledgegraph"

# Scanning options
scan_options:
  max_depth: 20
  follow_symlinks: false
  parse_java_classes: true  # Parse Java files to extract ClassInfo
  # Java parser strategy:
  #   "javalang_with_treesitter_fallback" (default) — try JavaLang first; fall back to
  #       TreeSitter only when JavaLang fails (e.g. modern Java syntax records/sealed).
  #       JavaLang has the most edge-case coverage (chained calls, local var tracking, etc.).
  #   "treesitter_only" — always use TreeSitter. Handles all Java versions uniformly.
  #       Use this once you are confident TreeSitter covers all your edge cases.
  java_parser_mode: "treesitter_only"
  extract_imports: true
  extract_methods: true
  batch_size: 2000  # Number of Cypher statements per transaction
  # Performance data: 2000=6 failures, 5000=15K failures, 8000=24K failures
  # With FQN indexes: 260 stmt/s (9x faster!)
  # Smaller batches minimize transaction failures and maintain high throughput
  skip_initial_phases: false  # Set to true to skip DB clearing, constraints, and DB repo scanning (start directly at SHOT 1)
  
  

  # Job filtering for faster testing
  build_all_jobs: false  # Set to false to build only specific jobs
  jobs_to_build: ["customerProcessingJob","customerExportJob","EFC-CS","orderProcessingJob","reportGenerationJob"]  # List of job names when build_all_jobs is false, e.g., ["job1", "job2", "job3"]

# Class data configuration
class_data:
  excel_file: "sample_data/class_level_data_1.xlsx"
  #excel_file: "sample_data/class_level_data_main.xlsx"

# Instance data configuration
instance_data:
  excel_file: "sample_data/instance_level_data_v4.xlsx"

# DB Operation Analysis Configuration
db_operation_analysis:
  # Strategy: "regex" or "llm"
  strategy: "regex"
  
  # LLM Configuration (used when strategy = "llm")
  llm:
    provider: "openai"  # openai, anthropic, bedrock, azure, ollama
    model: "gpt-4"  # gpt-4, gpt-3.5-turbo, claude-3-opus, etc.
    temperature: 0.1  # Lower for more deterministic results
    max_tokens: 2000
    timeout: 30  # seconds
    
    # API Configuration
    api_key_env: "OPENAI_API_KEY"  # Environment variable name
    # For Azure OpenAI
    azure_endpoint: ""
    azure_deployment: ""
    # For AWS Bedrock
    aws_region: "us-east-1"
    
  # Regex Configuration (used when strategy = "regex")
  regex:
    confidence_threshold: "MEDIUM"  # HIGH, MEDIUM, LOW
    
  # Common settings
  batch_size: 5  # Number of classes to process in parallel (for LLM)
  cache_results: true  # Cache LLM results to avoid re-analysis
  cache_file: ".db_operation_cache.json"

# Grey Area Keywords - used by enrichers and tools
# These keywords identify operations that need manual resolution
grey_area_keywords:
  # Core keywords for all operation types
  core: ['UNKNOWN', 'DYNAMIC', 'PARAMETERIZED']
  
  # DB operations
  db_operations: ['DYNAMIC_TABLE', 'DYNAMIC_CATALOG', 'DYNAMIC_SCHEMA']
  
  # Procedure calls
  procedure_calls: ['DYNAMIC_PROCEDURE', 'DYNAMIC_PACKAGE']
  
  # Shell executions
  shell_executions: ['DYNAMIC_PATH', 'DYNAMIC_SCRIPT', 'UNKNOWN_SCRIPT', 'REMOTE_EXECUTION']
  
  # Script quality indicators (lowercase)
  script_quality: ['unknown', 'dynamic', 'parameterized', 'variable', 'placeholder', 
                   'error', 'exception', 'unable', 'failed', 'missing', 'not found', 
                   'invalid', 'undefined', 'null', 'empty']
  
  # Enricher entry prefixes (for filtering)
  enricher_prefixes: ['Runtime.exec:', 'CommonsExec:', 'ProcessBuilder:', 'SSHClient:', 'SSH:']

# Dynamic Jobs configuration
# Dynamic jobs are batch jobs with no custom Java logic that run a shared
# DynamicTasklet class to execute shell scripts configured via an Excel sheet.
dynamic_jobs:
  enabled: true
  excel_file: "sample_data/Dynamic_Jobs.xlsx"

  # Shared virtual class used by every dynamic job step.
  # These values must match what dynamic_job_loader.py writes to Neo4j.
  dynamic_tasklet_class_fqn:   "com.batch.dynamic.DynamicTasklet"
  dynamic_tasklet_bean_id:     "dynamicTasklet"
  dynamic_tasklet_path:        "dynamic/DynamicTasklet.java"
  dynamic_spring_config_path:  "dynamic/dynamic-spring-config.xml"
